<div class="container py-4 form-container">

  <!-- BACK -->
  <div class="mb-4">
    <a routerLink="/clients" class="btn btn-sm btn-outline-secondary rounded-3">
      <i class="bi bi-arrow-left me-1"></i>Retour
    </a>
  </div>

  <!-- CARD -->
  <div class="bg-white rounded-4 shadow-sm overflow-hidden">

    <!-- HEADER -->
    <div class="form-header p-4 text-white">
      <h4 class="fw-bold mb-0">
        <i class="bi bi-person-{{ isEdit ? 'gear' : 'plus' }} me-2"></i>
        {{ isEdit ? 'Modifier le client' : 'Nouveau client' }}
      </h4>
    </div>

    <!-- BODY -->
    <div class="p-4">

      <!-- MESSAGE -->
      <div *ngIf="message"
           class="alert rounded-3"
           [ngClass]="messageType === 'success' ? 'alert-success' : 'alert-danger'">
        {{ message }}
      </div>

      <!-- FORM -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label fw-semibold">Nom *</label>
            <input class="form-control rounded-3"
                   formControlName="nom"
                   [ngClass]="{'is-invalid': submitted && f['nom'].errors}"
                   placeholder="Dupont">
            <div class="invalid-feedback">Nom requis</div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Prénom *</label>
            <input class="form-control rounded-3"
                   formControlName="prenom"
                   [ngClass]="{'is-invalid': submitted && f['prenom'].errors}"
                   placeholder="Jean">
            <div class="invalid-feedback">Prénom requis</div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Email *</label>
            <input type="email"
                   class="form-control rounded-3"
                   formControlName="email"
                   [ngClass]="{'is-invalid': submitted && f['email'].errors}"
                   placeholder="jean@exemple.com">
            <div class="invalid-feedback">Email invalide</div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Téléphone *</label>
            <input class="form-control rounded-3"
                   formControlName="telephone"
                   [ngClass]="{'is-invalid': submitted && f['telephone'].errors}"
                   placeholder="0612345678">
            <div class="invalid-feedback">Téléphone requis</div>
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">Adresse</label>
            <input class="form-control rounded-3"
                   formControlName="adresse"
                   placeholder="Casablanca">
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Date de naissance</label>
            <input type="date"
                   class="form-control rounded-3"
                   formControlName="dateNaissance">
          </div>

        </div>

        <!-- ACTIONS -->
        <div class="d-flex gap-2 mt-4">

          <button type="submit"
                  class="btn btn-primary rounded-3 px-4"
                  [disabled]="saving">

            <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>

            <i *ngIf="!saving" class="bi bi-check-lg me-2"></i>

            {{ isEdit ? 'Enregistrer' : 'Créer le client' }}
          </button>

          <a routerLink="/clients"
             class="btn btn-outline-secondary rounded-3 px-4">
            Annuler
          </a>

        </div>

      </form>
    </div>

  </div>
</div>
